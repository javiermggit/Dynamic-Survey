<div class="layout-shell admin-shell">
  <header class="layout-header">
    <div class="layout-header__inner">
      <div class="layout-brand">
        <span class="layout-brand__mark" aria-hidden="true"></span>
        <strong>Dynamic Survey</strong>
        <span>Panel de administracion de encuestas</span>
      </div>

      <nav class="layout-nav">
        <a
          routerLink="/admin"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          <span>Listado</span>
        </a>
        <a routerLink="/admin/create" routerLinkActive="active">
          <span>Crear</span>
        </a>
        <a routerLink="/runner" routerLinkActive="active">
          <span>Responder</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="layout-main">
    <router-outlet></router-outlet>
  </main>
</div>
