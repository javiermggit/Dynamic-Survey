<div class="runner-options">
  <label class="runner-option">
    <input type="radio" [name]="'boolean-' + question.id" value="true" [(ngModel)]="value" />
    <span class="runner-option__label">Si</span>
  </label>
  <label class="runner-option">
    <input type="radio" [name]="'boolean-' + question.id" value="false" [(ngModel)]="value" />
    <span class="runner-option__label">No</span>
  </label>
</div>

<div class="btn-row runner-form__actions">
  <button class="btn-primary" type="button" (click)="submit()" [disabled]="saving">
    {{ saving ? 'Guardando...' : 'Siguiente' }}
  </button>
</div>
