<form class="form-grid runner-form" [formGroup]="form" (ngSubmit)="submit()">
  <div class="field">
    <label for="text-answer">Respuesta</label>
    <input
      id="text-answer"
      type="text"
      formControlName="answerValue"
      [placeholder]="question.placeholder || 'Escribe tu respuesta'" />
    <span
      class="error-text"
      *ngIf="form.controls.answerValue.touched && form.controls.answerValue.invalid">
      Este campo es obligatorio.
    </span>
  </div>

  <div class="btn-row runner-form__actions">
    <button class="btn-primary" type="submit" [disabled]="saving">
      {{ saving ? 'Guardando...' : 'Siguiente' }}
    </button>
  </div>
</form>
