<div class="option-list">
  <label class="option-item" *ngFor="let option of question.options">
    <input
      type="checkbox"
      (change)="toggleOption(option.id, $any($event.target).checked)" />
    <span>{{ option.label }}</span>
  </label>
</div>

<div class="btn-row">
  <button class="btn-primary" type="button" (click)="submit()" [disabled]="saving">
    {{ saving ? 'Guardando...' : 'Siguiente' }}
  </button>
</div>
