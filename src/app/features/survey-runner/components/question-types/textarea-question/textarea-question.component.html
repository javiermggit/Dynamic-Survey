<form class="form-grid" [formGroup]="form" (ngSubmit)="submit()">
  <div class="field">
    <label for="textarea-answer">Respuesta</label>
    <textarea
      id="textarea-answer"
      formControlName="answerValue"
      [placeholder]="question.placeholder || 'Escribe tu respuesta'"></textarea>
    <span
      class="error-text"
      *ngIf="form.controls.answerValue.touched && form.controls.answerValue.invalid">
      Este campo es obligatorio.
    </span>
  </div>

  <div class="btn-row">
    <button class="btn-primary" type="submit" [disabled]="saving">
      {{ saving ? 'Guardando...' : 'Siguiente' }}
    </button>
  </div>
</form>
