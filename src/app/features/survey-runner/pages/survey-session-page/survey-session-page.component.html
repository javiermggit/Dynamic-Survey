<section class="page-stack">
  <div class="survey-card" *ngIf="loading">
    <p>Cargando sesion...</p>
  </div>

  <div class="survey-card" *ngIf="errorMessage">
    <p class="error-text">{{ errorMessage }}</p>
  </div>

  <ng-container *ngIf="!loading && state.session as session">
    <article class="survey-card session-toolbar">
      <div class="session-toolbar__copy">
        <p class="eyebrow">Navegacion</p>
        <h2>Continua o cierra la sesion</h2>
        <p class="muted">Mantienes el control del recorrido en todo momento.</p>
      </div>

      <div class="btn-row session-toolbar__actions">
        <a class="btn-secondary" routerLink="/runner">Volver</a>
        <button class="btn-secondary" type="button" [disabled]="completing || saving" (click)="onCompleteSession()">
          {{ completing ? 'Finalizando...' : 'Finalizar' }}
        </button>
      </div>
    </article>

    <app-survey-progress
      [survey]="state.survey!"
      [session]="session"
      [progress]="progress">
    </app-survey-progress>

    <app-survey-complete *ngIf="session.status === 'Completed'"></app-survey-complete>

    <app-survey-question-host
      *ngIf="session.status !== 'Completed' && hasConfiguredQuestions"
      [question]="state.getCurrentQuestion()"
      [saving]="saving"
      (submitAnswer)="onSubmitAnswer($event)">
    </app-survey-question-host>

    <article class="question-card" *ngIf="session.status !== 'Completed' && !hasConfiguredQuestions">
      <p class="muted">
        Esta encuesta no tiene preguntas configuradas todavia. Agregalas desde administracion antes de iniciar el recorrido.
      </p>
    </article>
  </ng-container>
</section>
